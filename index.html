<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioFrutas - do Pomar para você</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">BioFrutas</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#vitrine">Produto</a></li>
                    <li class="nav-item"><a class="nav-link" href="#cadastro">Anunciar Produto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="vitrine" class="container my-5">
        <h2 class="text-center mb-4">Nossas Colheitas</h2>
        <div class="row g-4">
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100 shadow-sm border-0">
                    <span class="badge bg-danger position-absolute m-2">Promoção</span>
                    <img src="FotodeFruta.jfif" class="card-img p-3" alt="Laranja">
                    <div class="card-body text-center">
                        <h5 class="card-title text-uppercase">Laranja Lima</h5>
                        <p class="card-text text-muted small">Rica em Vitamina C, doce e suculenta.</p>
                        <p class="h5 text-success">R$ 5,90 <small class="text-muted text-decoration-line-through fs-6">R$ 8,00</small></p>
                        <button class="btn btn-outline-success w-100">Comprar</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="cadastro" class="bg-light py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 bg-white p-4 rounded shadow">
                    <h3 class="mb-3">Cadstrar Nova Fruta</h3>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Nome da Fruta</label>
                            <input type="text" class="form-control" placeholder="Ex: Manga Palmer">
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Preço (KG)</label>
                                <input type="number" class="form-control" placeholder="0.00">
                            </div>
                            <div class="col">
                                <label class="form-label">Categoria</label>
                                <select class="form-select">
                                    <option>Frutas Cítricas</option>
                                    <option>Frutas Tropicais</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Salvar no Estoque</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
    
</body>
</html>
